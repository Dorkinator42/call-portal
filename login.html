<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: #4f46e5;
      border-radius: 12px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 26px; height: 26px; fill: #fff; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
    }

    p.subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    input[type="email"] {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 15px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
      margin-bottom: 12px;
    }

    input[type="email"]:focus {
      border-color: #4f46e5;
      background: #fff;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .toast {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
    }

    .toast.success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .toast.failure {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24 11.47 11.47 0 003.58.57 1 1 0 011 1V21a1 1 0 01-1 1A17 17 0 013 5a1 1 0 011-1h3.5a1 1 0 011 1 11.47 11.47 0 00.57 3.58 1 1 0 01-.25 1.01l-2.2 2.2z"/>
    </svg>
  </div>

  <h1>Client Portal</h1>
  <p class="subtitle">Enter your email and we'll send you a secure login link. No password needed.</p>

  <input type="email" id="email" placeholder="you@example.com" />
  <button id="submitBtn" onclick="sendMagicLink()">Send Login Link</button>

  <div class="toast" id="toast"></div>

  <p class="footer">Having trouble? Contact your account manager.</p>
</div>

<script>
  const SUPABASE_URL      = 'https://xwgcmujtjjdwgeuxaped.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_zXW-6roQqrDzLvUFbk7ymA_WqjoAcsB';

  const btn   = document.getElementById('submitBtn');
  const toast = document.getElementById('toast');

  function showToast(type, message) {
    toast.className = `toast ${type}`;
    toast.textContent = message;
    toast.style.display = 'block';
  }

  // If user lands here after clicking magic link, exchange token and redirect
  async function handleMagicLinkCallback() {
    const hash = window.location.hash;
    if (!hash.includes('access_token')) return;

    const params = new URLSearchParams(hash.substring(1));
    const accessToken  = params.get('access_token');
    const refreshToken = params.get('refresh_token');

    if (accessToken) {
      sessionStorage.setItem('sb_access_token', accessToken);
      sessionStorage.setItem('sb_refresh_token', refreshToken);
      window.location.href = 'dashboard.html';
    }
  }

  async function sendMagicLink() {
    const email = document.getElementById('email').value.trim();
    if (!email) {
      showToast('failure', 'Please enter your email address.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/magiclink`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({ email }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error_description || err.msg || 'Something went wrong.');
      }

      showToast('success', `✓ Login link sent to ${email}. Check your inbox.`);
      document.getElementById('email').value = '';
    } catch (err) {
      showToast('failure', `Error: ${err.message}`);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Login Link';
    }
  }

  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMagicLink();
  });

  handleMagicLinkCallback();
</script>

</body>
</html>
